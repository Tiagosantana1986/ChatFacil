<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChatFacil · Mensagens</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e13; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    
    /* Cores do tema */
    :root {
      --primary: #1f8c76;
      --primary-dark: #1a7562;
      --sidebar: #111b21;
      --sidebar-hover: #202c33;
      --chat-bg: #0b141a;
      --message-in: #1f2c33;
      --message-out: #005c4b;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --border-color: #222e35;
    }
    
    .bg-sidebar { background: var(--sidebar); }
    .bg-chat { background: var(--chat-bg); }
    .bg-message-out { background: var(--message-out); }
    .bg-message-in { background: var(--message-in); }
    .hover-sidebar:hover { background: var(--sidebar-hover); }
    
    .text-primary { color: var(--text-primary); }
    .text-secondary { color: var(--text-secondary); }
    
    .border-custom { border-color: var(--border-color); }
    
    /* Scrollbar elegante */
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #2a373f; border-radius: 10px; }
    
    /* Avatar placeholder */
    .avatar-placeholder {
      background: #6a7178;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    /* Balões de mensagem */
    .msg-bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .msg-out { background: var(--message-out); color: #fff; border-top-right-radius: 0; }
    .msg-in { background: var(--message-in); color: #e9edef; border-top-left-radius: 0; }
    
    /* Badge não lidas */
    .badge-unread {
      background: #00a884;
      color: #111b21;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    /* Campo de pesquisa */
    .search-box {
      background: var(--sidebar-hover);
      border-radius: 24px;
      padding: 8px 16px;
      color: white;
      border: none;
    }
    .search-box::placeholder { color: var(--text-secondary); font-size: 0.9rem; }
    
    /* Input de mensagem */
    .message-input {
      background: #2a3942;
      border-radius: 24px;
      padding: 12px 16px;
      color: white;
      border: none;
    }
    .message-input::placeholder { color: var(--text-secondary); }
  </style>
</head>
<body class="text-primary">
  <div id="app" class="h-screen flex"></div>

  <script>
    const { createApp, ref, reactive, computed, watch, nextTick } = Vue;

    const STORAGE_KEY = 'chat_facil_db';
    const MAX_FILE_SIZE = 2 * 1024 * 1024;

    const defaultDB = {
      users: [
        { id: 'admin1', login: 'admin', password: 'admin123', role: 'admin', status: 'active', hidden: false, createdBy: null, approvedBy: null, createdAt: Date.now(), passwordChanged: true, presence: 'online', avatar: null }
      ],
      conversations: [],
      groups: [],
      groupMembers: [],
      messages: [],
      lastRead: {}
    };

    function loadDB() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) { localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultDB)); return JSON.parse(JSON.stringify(defaultDB)); }
      try {
        const db = JSON.parse(stored);
        if (!db.lastRead) db.lastRead = {};
        db.users.forEach(u => { if (u.passwordChanged === undefined) u.passwordChanged = (u.role === 'admin'); if (!u.presence) u.presence = 'online'; if (!u.avatar) u.avatar = null; });
        return db;
      } catch (e) { return JSON.parse(JSON.stringify(defaultDB)); }
    }

    function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }

    const app = createApp({
      setup() {
        const db = reactive(loadDB());
        watch(db, (newVal) => { saveDB(newVal); }, { deep: true });

        const currentUser = ref(null);
        const loginInput = ref('');
        const senhaInput = ref('');
        const erroLogin = ref('');
        const forcePasswordChange = ref(false);
        const newPassword1 = ref('');
        const newPassword2 = ref('');
        const erroSenha = ref('');
        const showAdminPanel = ref(false);
        const showNewGroupModal = ref(false);
        const showNewUserModal = ref(false);
        const showProfileModal = ref(false);
        const newUserName = ref('');
        const newUserPass = ref('');
        const newUserAutoApprove = ref(true);
        const newGroupName = ref('');
        const selectedGroupMembers = ref([]);
        const activeChat = reactive({ type: null, id: null, name: '' });
        const newMessage = ref('');
        const fileInput = ref(null);
        const searchQuery = ref('');
        const novaConversaId = ref('');
        const editingPresence = ref('online');
        const avatarInput = ref(null);

        // Computed
        const visibleUsers = computed(() => {
          if (!currentUser.value) return [];
          return db.users.filter(u => u.id !== currentUser.value.id && u.status === 'active' && !u.hidden);
        });

        const myPrivateChats = computed(() => {
          if (!currentUser.value) return [];
          const convs = db.conversations.filter(c => c.user1 === currentUser.value.id || c.user2 === currentUser.value.id);
          let result = convs.map(c => {
            const otherId = c.user1 === currentUser.value.id ? c.user2 : c.user1;
            const other = db.users.find(u => u.id === otherId);
            if (!other) return null;
            const lastMsg = db.messages.filter(m => m.conversationId === c.id).sort((a,b) => b.createdAt - a.createdAt)[0];
            return { ...c, other, lastMsg };
          }).filter(c => c !== null);
          if (searchQuery.value) result = result.filter(c => c.other.login.toLowerCase().includes(searchQuery.value.toLowerCase()));
          return result;
        });

        const myGroups = computed(() => {
          if (!currentUser.value) return [];
          const memberOf = db.groupMembers.filter(m => m.userId === currentUser.value.id).map(m => m.groupId);
          return db.groups.filter(g => memberOf.includes(g.id));
        });

        const activeMessages = computed(() => {
          if (!activeChat.id) return [];
          if (activeChat.type === 'private') return db.messages.filter(m => m.conversationId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          else if (activeChat.type === 'group') return db.messages.filter(m => m.groupId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          return [];
        });

        const adminUserList = computed(() => db.users.filter(u => u.role !== 'admin'));

        // Helpers
        function getPresenceDot(p) { const map = { 'online':'🟢','busy':'🟡','away':'🟠','offline':'🔴' }; return map[p]||'⚪'; }
        function getInitials(l) { return l.substring(0,2).toUpperCase(); }
        function formatLastMessageTime(ts) { if(!ts) return ''; const d = new Date(ts); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        function getSenderName(id) { const u = db.users.find(u => u.id === id); return u ? u.login : 'Desconhecido'; }
        function getSender(id) { return db.users.find(u => u.id === id); }
        function isImageFile(ft) { return ft && ft.startsWith('image/'); }
        function scrollToBottom() { nextTick(() => { const el = document.querySelector('#messages-container'); if(el) el.scrollTop = el.scrollHeight; }); }

        // Controle de leitura
        function getLastReadTimestamp(chatType, chatId) {
          if (!currentUser.value) return 0;
          const userId = currentUser.value.id;
          if (!db.lastRead[userId]) db.lastRead[userId] = { private: {}, group: {} };
          return db.lastRead[userId][chatType === 'private' ? 'private' : 'group'][chatId] || 0;
        }
        function setLastReadNow(chatType, chatId) {
          if (!currentUser.value) return;
          const userId = currentUser.value.id;
          if (!db.lastRead[userId]) db.lastRead[userId] = { private: {}, group: {} };
          db.lastRead[userId][chatType === 'private' ? 'private' : 'group'][chatId] = Date.now();
        }
        function unreadCount(chatType, chatId) {
          if (!currentUser.value) return 0;
          const lastRead = getLastReadTimestamp(chatType, chatId);
          let msgs = [];
          if (chatType === 'private') msgs = db.messages.filter(m => m.conversationId === chatId && m.senderId !== currentUser.value.id);
          else msgs = db.messages.filter(m => m.groupId === chatId && m.senderId !== currentUser.value.id);
          return msgs.filter(m => m.createdAt > lastRead).length;
        }
        function markAsRead(chatType, chatId) { setLastReadNow(chatType, chatId); }

        // Autenticação
        function login() {
          erroLogin.value = '';
          const user = db.users.find(u => u.login === loginInput.value && u.password === senhaInput.value);
          if (!user) { erroLogin.value = 'Credenciais inválidas.'; return; }
          if (user.status !== 'active') { erroLogin.value = 'Usuário não aprovado.'; return; }
          currentUser.value = { ...user };
          loginInput.value = senhaInput.value = '';
          if (!user.passwordChanged) forcePasswordChange.value = true;
          else { forcePasswordChange.value = false; if (user.role === 'admin') showAdminPanel.value = false; }
          if (!db.lastRead[user.id]) db.lastRead[user.id] = { private: {}, group: {} };
        }
        function logout() {
          currentUser.value = null;
          activeChat.id = activeChat.type = null; activeChat.name = '';
          showAdminPanel.value = forcePasswordChange.value = false;
        }

        // Senha
        function changePassword() {
          erroSenha.value = '';
          if (!newPassword1.value || newPassword1.value.length < 4) { erroSenha.value = 'Senha muito curta.'; return; }
          if (newPassword1.value !== newPassword2.value) { erroSenha.value = 'Senhas não coincidem.'; return; }
          if (currentUser.value && newPassword1.value === currentUser.value.password) { erroSenha.value = 'Senha igual à temporária.'; return; }
          const userInDb = db.users.find(u => u.id === currentUser.value.id);
          if (userInDb) { userInDb.password = newPassword1.value; userInDb.passwordChanged = true; }
          currentUser.value.password = newPassword1.value;
          currentUser.value.passwordChanged = true;
          forcePasswordChange.value = false;
          newPassword1.value = newPassword2.value = '';
        }

        // Perfil
        function openProfile() { editingPresence.value = currentUser.value.presence || 'online'; showProfileModal.value = true; }
        function saveProfile() {
          const u = db.users.find(u => u.id === currentUser.value.id);
          if (u) { u.presence = editingPresence.value; currentUser.value.presence = editingPresence.value; }
          showProfileModal.value = false;
        }
        function handleAvatarUpload(e) {
          const file = e.target.files[0]; if (!file) return;
          if (file.size > 500*1024) { alert('Máximo 500KB'); return; }
          const reader = new FileReader();
          reader.onload = (ev) => {
            const u = db.users.find(u => u.id === currentUser.value.id);
            if (u) { u.avatar = ev.target.result; currentUser.value.avatar = ev.target.result; }
          };
          reader.readAsDataURL(file);
        }

        // Admin
        function generateCredentials() {
          const adj = ['azul','feliz','rapido','sabio','forte','leve'];
          const sub = ['gato','tigre','lobo','panda','raposa','coruja'];
          newUserName.value = `${adj[Math.floor(Math.random()*6)]}.${sub[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
          newUserPass.value = `${adj[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
        }
        function createUser() {
          if (!newUserName.value || !newUserPass.value) return;
          if (db.users.find(u => u.login === newUserName.value)) { alert('Login já existe.'); return; }
          db.users.push({
            id: genId(), login: newUserName.value, password: newUserPass.value, role: 'user',
            status: newUserAutoApprove.value ? 'active' : 'pending', hidden: false, createdBy: currentUser.value.id,
            approvedBy: newUserAutoApprove.value ? currentUser.value.id : null, createdAt: Date.now(),
            passwordChanged: false, presence: 'online', avatar: null
          });
          newUserName.value = newUserPass.value = ''; showNewUserModal.value = false;
        }
        function approveUser(id) { const u = db.users.find(u => u.id === id); if (u) { u.status = 'active'; u.approvedBy = currentUser.value.id; } }
        function toggleHidden(id) { const u = db.users.find(u => u.id === id); if (u && u.role !== 'admin') u.hidden = !u.hidden; }
        function toggleBlock(id) { const u = db.users.find(u => u.id === id); if (u && u.role !== 'admin') u.status = u.status === 'blocked' ? 'pending' : 'blocked'; }
        function deleteUser(id) {
          const u = db.users.find(u => u.id === id);
          if (!u || u.role === 'admin') { alert('Não pode excluir admin.'); return; }
          if (!confirm(`Excluir ${u.login}?`)) return;
          db.users = db.users.filter(u => u.id !== id);
          db.conversations = db.conversations.filter(c => c.user1 !== id && c.user2 !== id);
          db.groupMembers = db.groupMembers.filter(m => m.userId !== id);
          db.messages = db.messages.filter(m => m.senderId !== id);
          if (activeChat.type === 'private') { const conv = db.conversations.find(c => c.id === activeChat.id); if (conv && (conv.user1 === id || conv.user2 === id)) { activeChat.id = activeChat.type = null; activeChat.name = ''; } }
          delete db.lastRead[id];
        }
        function deleteConversation(cid) {
          if (!confirm('Apagar conversa?')) return;
          db.conversations = db.conversations.filter(c => c.id !== cid);
          db.messages = db.messages.filter(m => m.conversationId !== cid);
          Object.keys(db.lastRead).forEach(uid => { if (db.lastRead[uid].private[cid]) delete db.lastRead[uid].private[cid]; });
          if (activeChat.type === 'private' && activeChat.id === cid) { activeChat.id = activeChat.type = null; activeChat.name = ''; }
        }
        function deleteGroup(gid) {
          if (!confirm('Excluir grupo?')) return;
          db.groups = db.groups.filter(g => g.id !== gid);
          db.groupMembers = db.groupMembers.filter(m => m.groupId !== gid);
          db.messages = db.messages.filter(m => m.groupId !== gid);
          Object.keys(db.lastRead).forEach(uid => { if (db.lastRead[uid].group[gid]) delete db.lastRead[uid].group[gid]; });
          if (activeChat.type === 'group' && activeChat.id === gid) { activeChat.id = activeChat.type = null; activeChat.name = ''; }
        }
        function createGroup() {
          if (!newGroupName.value || selectedGroupMembers.value.length === 0) return;
          const gid = genId();
          db.groups.push({ id: gid, name: newGroupName.value, createdBy: currentUser.value.id, createdAt: Date.now() });
          [...selectedGroupMembers.value, currentUser.value.id].forEach(uid => db.groupMembers.push({ groupId: gid, userId: uid }));
          newGroupName.value = ''; selectedGroupMembers.value = []; showNewGroupModal.value = false;
        }

        // Envio de arquivos
        function triggerFileUpload() { fileInput.value.click(); }
        function handleFileUpload(e) {
          const file = e.target.files[0]; if (!file) return;
          if (file.size > MAX_FILE_SIZE) { alert('Máximo 2MB'); return; }
          const reader = new FileReader();
          reader.onload = (ev) => { sendFileMessage(ev.target.result, file.name, file.type); };
          reader.readAsDataURL(file);
          e.target.value = '';
        }
        function sendFileMessage(dataUrl, name, type) {
          if (!activeChat.id) return;
          const msg = { id: genId(), senderId: currentUser.value.id, text: '', file: { name, type, data: dataUrl }, createdAt: Date.now() };
          if (activeChat.type === 'private') msg.conversationId = activeChat.id;
          else msg.groupId = activeChat.id;
          db.messages.push(msg);
          markAsRead(activeChat.type, activeChat.id);
          scrollToBottom();
        }

        // Chat
        function selectPrivateChat(userId) {
          if (!userId) return;
          let conv = db.conversations.find(c => (c.user1 === currentUser.value.id && c.user2 === userId) || (c.user1 === userId && c.user2 === currentUser.value.id));
          if (!conv) {
            conv = { id: genId(), user1: currentUser.value.id, user2: userId };
            db.conversations.push(conv);
          }
          const other = db.users.find(u => u.id === userId);
          activeChat.type = 'private';
          activeChat.id = conv.id;
          activeChat.name = other.login;
          markAsRead('private', conv.id);
          novaConversaId.value = '';
          scrollToBottom();
        }
        function selectGroupChat(groupId) {
          const g = db.groups.find(g => g.id === groupId);
          if (!g) return;
          activeChat.type = 'group';
          activeChat.id = groupId;
          activeChat.name = g.name;
          markAsRead('group', groupId);
          scrollToBottom();
        }
        function sendMessage() {
          if (!newMessage.value.trim() || !activeChat.id) return;
          const msg = { id: genId(), senderId: currentUser.value.id, text: newMessage.value.trim(), createdAt: Date.now() };
          if (activeChat.type === 'private') msg.conversationId = activeChat.id;
          else msg.groupId = activeChat.id;
          db.messages.push(msg);
          newMessage.value = '';
          markAsRead(activeChat.type, activeChat.id);
          scrollToBottom();
        }

        function downloadFile(url, name) { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); }

        return {
          db, currentUser, loginInput, senhaInput, erroLogin, forcePasswordChange, newPassword1, newPassword2, erroSenha, changePassword,
          showAdminPanel, showNewUserModal, showNewGroupModal, showProfileModal,
          newUserName, newUserPass, newUserAutoApprove, newGroupName, selectedGroupMembers,
          activeChat, newMessage, fileInput, searchQuery, novaConversaId,
          visibleUsers, myPrivateChats, myGroups, activeMessages, adminUserList,
          login, logout, generateCredentials, createUser, approveUser, toggleHidden, toggleBlock,
          deleteUser, deleteConversation, deleteGroup, createGroup,
          selectPrivateChat, selectGroupChat, sendMessage, getSenderName, scrollToBottom,
          unreadCount, markAsRead, getSender,
          editingPresence, avatarInput, openProfile, saveProfile, handleAvatarUpload,
          getPresenceDot, getInitials, triggerFileUpload, handleFileUpload, isImageFile, downloadFile,
          formatLastMessageTime
        };
      },
      template: `
        <div class="h-full w-full flex">
          <!-- Login -->
          <div v-if="!currentUser" class="flex items-center justify-center h-full w-full p-4" style="background: #0b141a;">
            <div class="bg-[#111b21] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-[#222e35]">
              <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto bg-[#1f8c76] rounded-2xl flex items-center justify-center shadow-lg">
                  <i class="fas fa-comment-dots text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-semibold text-white mt-4 tracking-tight">ChatFacil</h1>
                <p class="text-[#8696a0] text-sm mt-1">Comunicação simples e segura</p>
              </div>
              <form @submit.prevent="login">
                <div class="mb-4">
                  <input v-model="loginInput" type="text" placeholder="Login" class="w-full p-3 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white placeholder-[#8696a0] focus:outline-none focus:ring-2 focus:ring-[#1f8c76]">
                </div>
                <div class="mb-6">
                  <input v-model="senhaInput" type="password" placeholder="Senha" class="w-full p-3 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white placeholder-[#8696a0] focus:outline-none focus:ring-2 focus:ring-[#1f8c76]">
                </div>
                <button type="submit" class="w-full bg-[#1f8c76] hover:bg-[#1a7562] text-white py-3 rounded-xl font-medium transition shadow-lg shadow-[#1f8c76]/20">Entrar</button>
                <p v-if="erroLogin" class="text-red-400 text-sm mt-3 text-center">{{ erroLogin }}</p>
              </form>
              <div class="mt-6 text-xs text-[#8696a0] text-center border-t border-[#222e35] pt-4">
                Admin: admin / admin123
              </div>
            </div>
          </div>

          <!-- Troca de senha -->
          <div v-else-if="forcePasswordChange" class="flex items-center justify-center h-full w-full p-4" style="background: #0b141a;">
            <div class="bg-[#111b21] p-6 rounded-2xl shadow-xl w-full max-w-sm border border-[#222e35]">
              <h2 class="text-xl font-semibold mb-4 text-white">🔐 Alterar Senha</h2>
              <p class="text-sm text-[#8696a0] mb-4">Primeiro acesso: defina sua senha pessoal</p>
              <form @submit.prevent="changePassword">
                <input v-model="newPassword1" type="password" placeholder="Nova senha" class="w-full p-3 mb-3 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
                <input v-model="newPassword2" type="password" placeholder="Confirme" class="w-full p-3 mb-4 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
                <button type="submit" class="w-full bg-[#1f8c76] text-white py-3 rounded-xl font-medium">Salvar</button>
                <p v-if="erroSenha" class="text-red-400 text-sm mt-3">{{ erroSenha }}</p>
              </form>
            </div>
          </div>

          <!-- App principal -->
          <div v-else class="flex w-full h-full">
            <!-- Sidebar -->
            <div class="w-full md:w-96 bg-sidebar flex flex-col h-full border-r border-custom">
              <!-- Header -->
              <div class="p-4 flex justify-between items-center border-b border-custom">
                <div class="flex items-center gap-3 cursor-pointer" @click="openProfile">
                  <div class="relative">
                    <div v-if="currentUser.avatar" class="w-10 h-10 rounded-full overflow-hidden"><img :src="currentUser.avatar" class="w-full h-full object-cover" /></div>
                    <div v-else class="avatar-placeholder w-10 h-10 rounded-full text-sm">{{ getInitials(currentUser.login) }}</div>
                    <span class="absolute -bottom-0.5 -right-0.5 text-sm">{{ getPresenceDot(currentUser.presence) }}</span>
                  </div>
                  <span class="text-white font-medium">{{ currentUser.login }}</span>
                </div>
                <div class="flex gap-2 text-[#aebac1]">
                  <button v-if="currentUser.role === 'admin'" @click="showAdminPanel = !showAdminPanel" class="hover:bg-white/10 p-2 rounded-full"><i class="fas fa-cog"></i></button>
                  <button @click="logout" class="hover:bg-white/10 p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
                </div>
              </div>

              <!-- Admin panel -->
              <div v-if="showAdminPanel && currentUser.role === 'admin'" class="bg-[#1f2c33] p-3 border-b border-custom space-y-3">
                <div class="flex justify-between items-center">
                  <h3 class="text-white text-sm font-semibold">👥 Usuários</h3>
                  <button @click="showNewUserModal = true" class="text-xs bg-[#1f8c76] text-white px-3 py-1.5 rounded-full">+ Novo</button>
                </div>
                <div class="max-h-36 overflow-y-auto custom-scroll text-sm space-y-1">
                  <div v-for="u in db.users" :key="u.id" class="flex items-center justify-between py-1.5 border-b border-[#2a373f] last:border-0">
                    <div class="flex items-center gap-1 text-white"><span>{{ u.login }}</span><span v-if="!u.passwordChanged" class="text-orange-300 text-xs">⚠️</span></div>
                    <div class="flex gap-1">
                      <button v-if="u.status==='pending'" @click="approveUser(u.id)" class="text-green-400 text-xs p-1">✓</button>
                      <button @click="toggleHidden(u.id)" class="text-gray-400 text-xs p-1">{{ u.hidden ? '👁' : '👻' }}</button>
                      <button v-if="u.role!=='admin'" @click="deleteUser(u.id)" class="text-red-400 text-xs p-1">🗑️</button>
                    </div>
                  </div>
                </div>
                <button @click="showNewGroupModal = true" class="text-xs bg-[#1f8c76] text-white px-3 py-1.5 rounded-full w-full">➕ Novo grupo</button>
              </div>

              <!-- Nova conversa (dropdown) -->
              <div class="p-3 border-b border-custom">
                <select v-model="novaConversaId" @change="selectPrivateChat(novaConversaId)" class="w-full p-2.5 bg-[#1f2c33] text-white rounded-xl border border-[#2a373f] focus:outline-none focus:ring-2 focus:ring-[#1f8c76]">
                  <option value="">➕ Nova conversa privada...</option>
                  <option v-for="u in visibleUsers" :key="u.id" :value="u.id">{{ u.login }}</option>
                </select>
              </div>

              <!-- Pesquisa -->
              <div class="p-3">
                <input v-model="searchQuery" type="text" placeholder="Pesquisar conversa" class="search-box w-full">
              </div>

              <!-- Lista de conversas -->
              <div class="flex-1 overflow-y-auto custom-scroll">
                <div v-for="chat in myPrivateChats" :key="chat.id" @click="selectPrivateChat(chat.other.id)" class="flex items-center p-3 hover-sidebar cursor-pointer border-b border-custom">
                  <div class="relative mr-3">
                    <div v-if="chat.other.avatar" class="w-12 h-12 rounded-full overflow-hidden"><img :src="chat.other.avatar" class="w-full h-full object-cover" /></div>
                    <div v-else class="avatar-placeholder w-12 h-12 rounded-full">{{ getInitials(chat.other.login) }}</div>
                    <span class="absolute -bottom-0.5 -right-0.5 text-sm">{{ getPresenceDot(chat.other.presence) }}</span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-center">
                      <span class="text-white font-medium truncate">{{ chat.other.login }}</span>
                      <span class="text-xs text-secondary">{{ chat.lastMsg ? formatLastMessageTime(chat.lastMsg.createdAt) : '' }}</span>
                    </div>
                    <div class="flex justify-between items-center mt-0.5">
                      <span class="text-sm text-secondary truncate">{{ chat.lastMsg ? (chat.lastMsg.text || '📎 Arquivo') : 'Nenhuma mensagem' }}</span>
                      <span v-if="unreadCount('private', chat.id) > 0" class="badge-unread">{{ unreadCount('private', chat.id) }}</span>
                    </div>
                  </div>
                </div>
                <!-- Grupos -->
                <div v-for="group in myGroups" :key="group.id" @click="selectGroupChat(group.id)" class="flex items-center p-3 hover-sidebar cursor-pointer border-b border-custom">
                  <div class="w-12 h-12 rounded-full bg-[#1f8c76] flex items-center justify-center mr-3 text-white"><i class="fas fa-users"></i></div>
                  <div class="flex-1">
                    <div class="flex justify-between items-center">
                      <span class="text-white font-medium">{{ group.name }}</span>
                      <span v-if="unreadCount('group', group.id) > 0" class="badge-unread">{{ unreadCount('group', group.id) }}</span>
                    </div>
                  </div>
                </div>
                <div v-if="myPrivateChats.length === 0 && myGroups.length === 0" class="text-center text-secondary p-8">
                  <i class="fas fa-comments text-3xl mb-2 opacity-50"></i>
                  <p>Nenhuma conversa ainda</p>
                  <p class="text-xs mt-1">Use o menu acima para iniciar</p>
                </div>
              </div>
            </div>

            <!-- Chat area -->
            <div class="flex-1 flex flex-col h-full bg-chat min-w-0">
              <!-- Cabeçalho do chat -->
              <div class="p-4 flex items-center gap-3 border-b border-custom bg-sidebar/50">
                <div class="w-10 h-10 rounded-full bg-[#1f8c76] flex items-center justify-center text-white">
                  <i v-if="activeChat.type==='private'" class="fas fa-user"></i>
                  <i v-else-if="activeChat.type==='group'" class="fas fa-users"></i>
                </div>
                <div class="text-white font-medium">{{ activeChat.name || 'ChatFacil' }}</div>
              </div>

              <!-- Mensagens -->
              <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll" style="background-image: url('https://web.whatsapp.com/img/bg-chat-tile-dark_a4be512e7195b6b733d9110b408f075d.png'); background-size: contain;">
                <div v-for="msg in activeMessages" :key="msg.id" class="flex gap-2" :class="{'flex-row-reverse': msg.senderId === currentUser.id}">
                  <div v-if="msg.senderId !== currentUser.id" class="flex-shrink-0">
                    <div v-if="getSender(msg.senderId)?.avatar" class="w-8 h-8 rounded-full overflow-hidden"><img :src="getSender(msg.senderId).avatar" class="w-full h-full object-cover" /></div>
                    <div v-else class="avatar-placeholder w-8 h-8 rounded-full text-xs">{{ getInitials(getSenderName(msg.senderId)) }}</div>
                  </div>
                  <div class="max-w-[70%]">
                    <div v-if="msg.senderId !== currentUser.id" class="text-xs text-secondary ml-1 mb-0.5">{{ getSenderName(msg.senderId) }}</div>
                    <div v-if="msg.text" class="msg-bubble" :class="msg.senderId === currentUser.id ? 'msg-out' : 'msg-in'">{{ msg.text }}</div>
                    <div v-if="msg.file" class="mt-1">
                      <div v-if="isImageFile(msg.file.type)" class="max-w-xs cursor-pointer" @click="downloadFile(msg.file.data, msg.file.name)"><img :src="msg.file.data" class="rounded-lg shadow" /></div>
                      <div v-else class="bg-[#1f2c33] p-3 rounded-lg shadow flex items-center gap-2"><i class="fas fa-file text-secondary"></i><span class="truncate">{{ msg.file.name }}</span><button @click="downloadFile(msg.file.data, msg.file.name)" class="text-[#1f8c76]"><i class="fas fa-download"></i></button></div>
                    </div>
                    <div class="text-xs text-secondary mt-1 text-right">{{ new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }}</div>
                  </div>
                </div>
                <div v-if="activeMessages.length === 0 && activeChat.id" class="text-center text-secondary py-12">
                  <i class="far fa-smile text-4xl mb-3 opacity-40"></i>
                  <p>Nenhuma mensagem ainda</p>
                  <p class="text-xs mt-1">Envie uma mensagem para começar</p>
                </div>
              </div>

              <!-- Input -->
              <div v-if="activeChat.id" class="p-3 bg-sidebar/50 flex items-center gap-2">
                <button @click="triggerFileUpload" class="text-secondary hover:text-white p-2"><i class="fas fa-paperclip"></i></button>
                <input v-model="newMessage" @keyup.enter="sendMessage" type="text" placeholder="Digite uma mensagem" class="message-input flex-1">
                <button @click="sendMessage" class="text-[#1f8c76] hover:text-white p-2"><i class="fas fa-paper-plane"></i></button>
                <input type="file" ref="fileInput" class="hidden" @change="handleFileUpload">
              </div>
              <div v-else class="p-3 bg-sidebar/50 text-center text-secondary text-sm">
                <i class="far fa-comment-dots mr-2"></i> Selecione uma conversa para começar
              </div>
            </div>
          </div>

          <!-- Modals (mantidos com estilo escuro) -->
          <div v-if="showProfileModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showProfileModal = false">
            <div class="bg-[#111b21] p-5 rounded-2xl w-full max-w-sm border border-[#222e35]">
              <h2 class="text-lg font-bold mb-4 text-white">Meu Perfil</h2>
              <div class="flex flex-col items-center mb-4">
                <div class="relative mb-2">
                  <div v-if="currentUser.avatar" class="w-20 h-20 rounded-full overflow-hidden"><img :src="currentUser.avatar" class="w-full h-full object-cover" /></div>
                  <div v-else class="avatar-placeholder w-20 h-20 rounded-full text-2xl">{{ getInitials(currentUser.login) }}</div>
                  <label class="absolute bottom-0 right-0 bg-[#1f8c76] p-1.5 rounded-full cursor-pointer shadow-lg"><i class="fas fa-camera text-white text-xs"></i><input type="file" accept="image/*" class="hidden" @change="handleAvatarUpload" ref="avatarInput"></label>
                </div>
              </div>
              <div class="mb-4">
                <label class="block text-sm mb-1 text-secondary">Status</label>
                <select v-model="editingPresence" class="w-full p-2 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
                  <option value="online">🟢 Disponível</option><option value="busy">🟡 Ocupado</option><option value="away">🟠 Ausente</option><option value="offline">🔴 Offline</option>
                </select>
              </div>
              <div class="flex gap-2">
                <button @click="saveProfile" class="flex-1 bg-[#1f8c76] text-white py-2 rounded-xl font-medium">Salvar</button>
                <button @click="showProfileModal = false" class="flex-1 bg-[#2a373f] text-white py-2 rounded-xl">Cancelar</button>
              </div>
            </div>
          </div>

          <div v-if="showNewUserModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewUserModal = false">
            <div class="bg-[#111b21] p-5 rounded-2xl w-full max-w-md border border-[#222e35]">
              <h2 class="text-lg font-bold mb-4 text-white">Criar usuário</h2>
              <div class="space-y-3">
                <input v-model="newUserName" placeholder="Login" class="w-full p-2.5 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
                <input v-model="newUserPass" placeholder="Senha temporária" class="w-full p-2.5 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
                <div class="flex items-center gap-2 text-secondary"><input type="checkbox" v-model="newUserAutoApprove" id="auto"><label for="auto">Aprovar automaticamente</label></div>
                <button @click="generateCredentials" class="text-sm text-[#1f8c76]">🎲 Gerar aleatório</button>
              </div>
              <div class="flex gap-2 mt-5">
                <button @click="createUser" class="flex-1 bg-[#1f8c76] text-white py-2 rounded-xl">Criar</button>
                <button @click="showNewUserModal = false" class="flex-1 bg-[#2a373f] text-white py-2 rounded-xl">Cancelar</button>
              </div>
            </div>
          </div>

          <div v-if="showNewGroupModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewGroupModal = false">
            <div class="bg-[#111b21] p-5 rounded-2xl w-full max-w-md border border-[#222e35]">
              <h2 class="text-lg font-bold mb-4 text-white">Criar grupo</h2>
              <input v-model="newGroupName" placeholder="Nome do grupo" class="w-full p-2.5 mb-3 bg-[#1f2c33] border border-[#2a373f] rounded-xl text-white">
              <div class="max-h-52 overflow-y-auto custom-scroll border border-[#2a373f] rounded-xl p-2 mb-3">
                <div v-for="u in adminUserList" :key="u.id" class="flex items-center gap-2 py-1.5 text-white"><input type="checkbox" :value="u.id" v-model="selectedGroupMembers"><span>{{ u.login }}</span></div>
              </div>
              <div class="flex gap-2">
                <button @click="createGroup" class="flex-1 bg-[#1f8c76] text-white py-2 rounded-xl">Criar</button>
                <button @click="showNewGroupModal = false" class="flex-1 bg-[#2a373f] text-white py-2 rounded-xl">Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      `
    });
    app.mount('#app');
  </script>
</body>
</html>
