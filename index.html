<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat Fechado · Admin</title>
  <!-- Tailwind para visual limpo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Vue para reatividade simples -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0f172a; font-family: system-ui, -apple-system, sans-serif; }
    .msg-propria { background: #2563eb; margin-left: auto; }
    .msg-outro { background: #334155; }
    .scroll-suave { scroll-behavior: smooth; }
  </style>
</head>
<body class="text-gray-100">
  <div id="app" class="h-screen flex flex-col"></div>

  <script>
    const { createApp, ref, reactive, computed, watch, nextTick, onMounted } = Vue;

    // ---------- "Banco de dados" local (localStorage) ----------
    const STORAGE_KEY = 'chat_fechado_db';

    // Estrutura inicial
    const defaultDB = {
      users: [
        { id: 'admin1', login: 'admin', password: 'admin123', role: 'admin', status: 'active', hidden: false, createdBy: null, approvedBy: null, createdAt: Date.now() }
      ],
      conversations: [],     // { id, user1, user2 }
      groups: [],            // { id, name, createdBy, createdAt }
      groupMembers: [],      // { groupId, userId }
      messages: []           // { id, conversationId, groupId, senderId, text, createdAt }
    };

    // Carrega / salva no localStorage
    function loadDB() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultDB));
        return JSON.parse(JSON.stringify(defaultDB));
      }
      try {
        return JSON.parse(stored);
      } catch (e) {
        return JSON.parse(JSON.stringify(defaultDB));
      }
    }

    function saveDB(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    // Helpers para IDs curtos
    function genId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // ---------- Aplicação Vue ----------
    const app = createApp({
      setup() {
        // Estado reativo do DB
        const db = reactive(loadDB());
        
        // Persistência automática (simples)
        watch(db, (newVal) => {
          saveDB(newVal);
        }, { deep: true });

        // Sessão atual
        const currentUser = ref(null);        // objeto do usuário logado
        const loginInput = ref('');
        const senhaInput = ref('');
        const erroLogin = ref('');

        // UI: abas / modais
        const activeTab = ref('chat');        // 'chat' ou 'admin'
        const showAdminPanel = ref(false);
        const showNewGroupModal = ref(false);
        const showNewUserModal = ref(false);

        // Formulários admin
        const newUserName = ref('');
        const newUserPass = ref('');
        const newUserAutoApprove = ref(true);
        const newGroupName = ref('');
        const selectedGroupMembers = ref([]);

        // Chat
        const activeChat = reactive({ type: null, id: null, name: '' });
        const newMessage = ref('');
        const messagesContainer = ref(null);

        // ---------- Computed ----------
        // Lista de usuários visíveis (não hidden, não o próprio, e ativos)
        const visibleUsers = computed(() => {
          if (!currentUser.value) return [];
          return db.users.filter(u => 
            u.id !== currentUser.value.id &&
            u.status === 'active' &&
            !u.hidden
          );
        });

        // Conversas privadas do usuário atual
        const myPrivateChats = computed(() => {
          if (!currentUser.value) return [];
          const convs = db.conversations.filter(c => 
            c.user1 === currentUser.value.id || c.user2 === currentUser.value.id
          );
          return convs.map(c => {
            const otherId = c.user1 === currentUser.value.id ? c.user2 : c.user1;
            const other = db.users.find(u => u.id === otherId);
            return { ...c, other };
          }).filter(c => c.other);
        });

        // Grupos dos quais o usuário é membro
        const myGroups = computed(() => {
          if (!currentUser.value) return [];
          const memberOf = db.groupMembers.filter(m => m.userId === currentUser.value.id).map(m => m.groupId);
          return db.groups.filter(g => memberOf.includes(g.id));
        });

        // Mensagens ativas
        const activeMessages = computed(() => {
          if (!activeChat.id) return [];
          if (activeChat.type === 'private') {
            return db.messages.filter(m => m.conversationId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          } else if (activeChat.type === 'group') {
            return db.messages.filter(m => m.groupId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          }
          return [];
        });

        // Usuários para seleção (admin vê todos, user vê apenas visíveis)
        const adminUserList = computed(() => {
          return db.users.filter(u => u.role !== 'admin'); // admin não pode criar outro admin
        });

        // ---------- Métodos de Autenticação ----------
        function login() {
          erroLogin.value = '';
          const user = db.users.find(u => u.login === loginInput.value && u.password === senhaInput.value);
          if (!user) {
            erroLogin.value = 'Credenciais inválidas.';
            return;
          }
          if (user.status !== 'active') {
            erroLogin.value = 'Usuário não aprovado. Aguarde o administrador.';
            return;
          }
          currentUser.value = { ...user }; // cópia
          loginInput.value = '';
          senhaInput.value = '';
          activeTab.value = 'chat';
          // Se for admin, pode ver painel admin
          if (user.role === 'admin') {
            showAdminPanel.value = false; // começa fechado
          }
        }

        function logout() {
          currentUser.value = null;
          activeChat.id = null;
          activeChat.type = null;
          activeChat.name = '';
          showAdminPanel.value = false;
        }

        // ---------- Admin: Gerenciar usuários ----------
        function generateCredentials() {
          const adj = ['azul', 'feliz', 'rapido', 'sabio', 'forte', 'leve'];
          const sub = ['gato', 'tigre', 'lobo', 'panda', 'raposa', 'coruja'];
          newUserName.value = `${adj[Math.floor(Math.random()*6)]}.${sub[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
          newUserPass.value = `${adj[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
        }

        function createUser() {
          if (!newUserName.value || !newUserPass.value) return;
          if (db.users.find(u => u.login === newUserName.value)) {
            alert('Login já existe.');
            return;
          }
          const newUser = {
            id: genId(),
            login: newUserName.value,
            password: newUserPass.value,
            role: 'user',
            status: newUserAutoApprove.value ? 'active' : 'pending',
            hidden: false,
            createdBy: currentUser.value.id,
            approvedBy: newUserAutoApprove.value ? currentUser.value.id : null,
            createdAt: Date.now()
          };
          db.users.push(newUser);
          newUserName.value = '';
          newUserPass.value = '';
          showNewUserModal.value = false;
        }

        function approveUser(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user) {
            user.status = 'active';
            user.approvedBy = currentUser.value.id;
          }
        }

        function toggleHidden(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user && user.role !== 'admin') {
            user.hidden = !user.hidden;
          }
        }

        function toggleBlock(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user && user.role !== 'admin') {
            user.status = user.status === 'blocked' ? 'pending' : 'blocked';
          }
        }

        // ---------- Admin: Grupos ----------
        function createGroup() {
          if (!newGroupName.value || selectedGroupMembers.value.length === 0) return;
          const groupId = genId();
          const newGroup = {
            id: groupId,
            name: newGroupName.value,
            createdBy: currentUser.value.id,
            createdAt: Date.now()
          };
          db.groups.push(newGroup);
          // Adiciona membros selecionados + admin
          const members = [...selectedGroupMembers.value, currentUser.value.id];
          members.forEach(userId => {
            db.groupMembers.push({ groupId, userId });
          });
          newGroupName.value = '';
          selectedGroupMembers.value = [];
          showNewGroupModal.value = false;
        }

        // ---------- Chat: Lógica ----------
        function selectPrivateChat(userId) {
          // Busca ou cria conversa
          let conv = db.conversations.find(c => 
            (c.user1 === currentUser.value.id && c.user2 === userId) ||
            (c.user1 === userId && c.user2 === currentUser.value.id)
          );
          if (!conv) {
            conv = {
              id: genId(),
              user1: currentUser.value.id,
              user2: userId
            };
            db.conversations.push(conv);
          }
          const other = db.users.find(u => u.id === userId);
          activeChat.type = 'private';
          activeChat.id = conv.id;
          activeChat.name = other.login;
          scrollToBottom();
        }

        function selectGroupChat(groupId) {
          const group = db.groups.find(g => g.id === groupId);
          if (!group) return;
          activeChat.type = 'group';
          activeChat.id = groupId;
          activeChat.name = group.name;
          scrollToBottom();
        }

        function sendMessage() {
          if (!newMessage.value.trim() || !activeChat.id) return;
          const msg = {
            id: genId(),
            senderId: currentUser.value.id,
            text: newMessage.value.trim(),
            createdAt: Date.now()
          };
          if (activeChat.type === 'private') {
            msg.conversationId = activeChat.id;
          } else {
            msg.groupId = activeChat.id;
          }
          db.messages.push(msg);
          newMessage.value = '';
          scrollToBottom();
        }

        function scrollToBottom() {
          nextTick(() => {
            const el = document.querySelector('#messages-container');
            if (el) el.scrollTop = el.scrollHeight;
          });
        }

        // Helper: nome do remetente
        function getSenderName(senderId) {
          const u = db.users.find(u => u.id === senderId);
          return u ? u.login : 'Desconhecido';
        }

        // Inicialização: se existir sessão no localStorage (opcional)
        onMounted(() => {
          // Não restaura automático para manter simples
        });

        // Expor para template
        return {
          // state
          db,
          currentUser,
          loginInput,
          senhaInput,
          erroLogin,
          activeTab,
          showAdminPanel,
          showNewUserModal,
          showNewGroupModal,
          newUserName,
          newUserPass,
          newUserAutoApprove,
          newGroupName,
          selectedGroupMembers,
          activeChat,
          newMessage,
          // computed
          visibleUsers,
          myPrivateChats,
          myGroups,
          activeMessages,
          adminUserList,
          // methods
          login,
          logout,
          generateCredentials,
          createUser,
          approveUser,
          toggleHidden,
          toggleBlock,
          createGroup,
          selectPrivateChat,
          selectGroupChat,
          sendMessage,
          getSenderName,
          scrollToBottom
        };
      },

      // ---------- Template ----------
      template: `
        <div class="h-full flex flex-col">
          <!-- Tela de Login (se não logado) -->
          <div v-if="!currentUser" class="flex items-center justify-center h-full p-4">
            <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm shadow-xl">
              <h1 class="text-2xl font-bold mb-2 text-center">🔒 Chat Fechado</h1>
              <p class="text-sm text-slate-400 text-center mb-6">Acesso apenas para convidados</p>
              <form @submit.prevent="login">
                <input v-model="loginInput" type="text" placeholder="Login" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off">
                <input v-model="senhaInput" type="password" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-700 rounded-lg border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold transition">Entrar</button>
                <p v-if="erroLogin" class="text-red-400 text-sm mt-3 text-center">{{ erroLogin }}</p>
              </form>
              <div class="mt-4 text-xs text-slate-500 text-center">
                Admin: admin / admin123
              </div>
            </div>
          </div>

          <!-- Interface Principal (logado) -->
          <div v-else class="flex flex-col md:flex-row h-full">
            <!-- Sidebar -->
            <div class="w-full md:w-80 bg-slate-800 border-r border-slate-700 flex flex-col h-1/3 md:h-full">
              <!-- Cabeçalho do usuário -->
              <div class="p-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex items-center gap-2">
                  <span class="font-medium">{{ currentUser.login }}</span>
                  <span v-if="currentUser.role === 'admin'" class="text-yellow-400 text-sm">👑</span>
                </div>
                <div class="flex gap-2">
                  <button v-if="currentUser.role === 'admin'" @click="showAdminPanel = !showAdminPanel" class="text-blue-400 text-sm px-2 py-1 hover:bg-slate-700 rounded">
                    Admin
                  </button>
                  <button @click="logout" class="text-red-400 text-sm px-2 py-1 hover:bg-slate-700 rounded">Sair</button>
                </div>
              </div>

              <!-- Painel Admin (expansível) -->
              <div v-if="showAdminPanel && currentUser.role === 'admin'" class="p-3 border-b border-slate-700 bg-slate-750 space-y-3">
                <div class="flex justify-between items-center">
                  <h3 class="font-semibold text-sm">👥 Usuários</h3>
                  <button @click="showNewUserModal = true" class="text-xs bg-blue-600 px-2 py-1 rounded">+ Novo</button>
                </div>
                <div class="max-h-40 overflow-y-auto text-sm space-y-1">
                  <div v-for="u in db.users" :key="u.id" class="flex items-center justify-between py-1 border-b border-slate-700 last:border-0">
                    <div class="flex items-center gap-1">
                      <span :class="{'text-green-400': u.status==='active', 'text-yellow-400': u.status==='pending', 'text-red-400': u.status==='blocked'}">{{ u.login }}</span>
                      <span v-if="u.hidden" class="text-gray-500 text-xs">🔒</span>
                    </div>
                    <div class="flex gap-1">
                      <button v-if="u.status === 'pending'" @click="approveUser(u.id)" class="text-green-400 text-xs px-1">✓</button>
                      <button @click="toggleHidden(u.id)" class="text-gray-400 text-xs px-1" :title="u.hidden ? 'Tornar visível' : 'Ocultar'">{{ u.hidden ? '👁' : '👻' }}</button>
                      <button v-if="u.role !== 'admin'" @click="toggleBlock(u.id)" class="text-xs px-1" :class="u.status==='blocked' ? 'text-green-400' : 'text-red-400'">{{ u.status==='blocked' ? '🔓' : '🔒' }}</button>
                    </div>
                  </div>
                </div>

                <div class="flex justify-between items-center mt-3">
                  <h3 class="font-semibold text-sm">📁 Grupos</h3>
                  <button @click="showNewGroupModal = true" class="text-xs bg-blue-600 px-2 py-1 rounded">+ Criar</button>
                </div>
              </div>

              <!-- Seleção de nova conversa -->
              <div class="p-3 border-b border-slate-700">
                <select @change="selectPrivateChat($event.target.value)" class="w-full p-2 bg-slate-700 rounded-lg border border-slate-600 text-sm">
                  <option value="">➕ Nova conversa privada...</option>
                  <option v-for="u in visibleUsers" :key="u.id" :value="u.id">{{ u.login }}</option>
                </select>
              </div>

              <!-- Listas de conversas e grupos -->
              <div class="flex-1 overflow-y-auto p-3 space-y-3">
                <!-- Privadas -->
                <div>
                  <div class="text-xs text-slate-400 mb-1 font-medium">Conversas</div>
                  <div v-for="chat in myPrivateChats" :key="chat.id" @click="selectPrivateChat(chat.other.id)" class="p-2 hover:bg-slate-700 rounded-lg cursor-pointer transition flex items-center gap-2">
                    <span>💬</span>
                    <span class="truncate">{{ chat.other.login }}</span>
                  </div>
                  <div v-if="myPrivateChats.length === 0" class="text-slate-500 text-xs p-2">Nenhuma conversa</div>
                </div>
                <!-- Grupos -->
                <div class="border-t border-slate-700 pt-2">
                  <div class="text-xs text-slate-400 mb-1 font-medium">Grupos</div>
                  <div v-for="group in myGroups" :key="group.id" @click="selectGroupChat(group.id)" class="p-2 hover:bg-slate-700 rounded-lg cursor-pointer transition flex items-center gap-2">
                    <span>👥</span>
                    <span class="truncate">{{ group.name }}</span>
                  </div>
                  <div v-if="myGroups.length === 0" class="text-slate-500 text-xs p-2">Nenhum grupo</div>
                </div>
              </div>
            </div>

            <!-- Área principal do chat -->
            <div class="flex-1 flex flex-col h-2/3 md:h-full bg-slate-900">
              <!-- Cabeçalho do chat ativo -->
              <div class="p-3 border-b border-slate-700 font-semibold flex items-center gap-2">
                <span v-if="activeChat.type === 'private'">💬</span>
                <span v-else-if="activeChat.type === 'group'">👥</span>
                <span>{{ activeChat.name || 'Selecione uma conversa' }}</span>
              </div>

              <!-- Mensagens -->
              <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-suave">
                <div v-for="msg in activeMessages" :key="msg.id" class="flex flex-col" :class="{'items-end': msg.senderId === currentUser.id}">
                  <div class="max-w-[80%] p-3 rounded-2xl text-sm" :class="msg.senderId === currentUser.id ? 'msg-propria' : 'msg-outro'">
                    <div v-if="msg.senderId !== currentUser.id" class="text-xs text-blue-300 mb-1">{{ getSenderName(msg.senderId) }}</div>
                    <div>{{ msg.text }}</div>
                  </div>
                  <span class="text-xs text-slate-500 mt-1">{{ new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }}</span>
                </div>
                <div v-if="activeMessages.length === 0 && activeChat.id" class="text-center text-slate-500 py-8">
                  Nenhuma mensagem ainda. Comece a conversa!
                </div>
              </div>

              <!-- Input de mensagem -->
              <form v-if="activeChat.id" @submit.prevent="sendMessage" class="p-3 border-t border-slate-700">
                <input v-model="newMessage" type="text" placeholder="Digite sua mensagem..." class="w-full p-3 bg-slate-800 rounded-full border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off">
              </form>
              <div v-else class="p-3 border-t border-slate-700 text-center text-slate-500">
                Selecione uma conversa para começar
              </div>
            </div>
          </div>

          <!-- Modal Criar Usuário -->
          <div v-if="showNewUserModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewUserModal = false">
            <div class="bg-slate-800 p-5 rounded-xl w-full max-w-md">
              <h2 class="text-lg font-bold mb-4">Criar novo usuário</h2>
              <div class="space-y-3">
                <input v-model="newUserName" type="text" placeholder="Login" class="w-full p-2 bg-slate-700 rounded border border-slate-600">
                <input v-model="newUserPass" type="text" placeholder="Senha" class="w-full p-2 bg-slate-700 rounded border border-slate-600">
                <div class="flex items-center gap-2">
                  <input type="checkbox" v-model="newUserAutoApprove" id="autoApprove" class="w-4 h-4">
                  <label for="autoApprove" class="text-sm">Aprovar automaticamente</label>
                </div>
                <button @click="generateCredentials" class="text-sm text-blue-400">🎲 Gerar credenciais aleatórias</button>
              </div>
              <div class="flex gap-2 mt-5">
                <button @click="createUser" class="flex-1 bg-blue-600 py-2 rounded-lg font-medium">Criar</button>
                <button @click="showNewUserModal = false" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>

          <!-- Modal Criar Grupo -->
          <div v-if="showNewGroupModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewGroupModal = false">
            <div class="bg-slate-800 p-5 rounded-xl w-full max-w-md">
              <h2 class="text-lg font-bold mb-4">Criar novo grupo</h2>
              <input v-model="newGroupName" type="text" placeholder="Nome do grupo" class="w-full p-2 mb-3 bg-slate-700 rounded border border-slate-600">
              <div class="max-h-52 overflow-y-auto border border-slate-600 rounded p-2 mb-3">
                <div v-for="u in adminUserList" :key="u.id" class="flex items-center gap-2 py-1">
                  <input type="checkbox" :value="u.id" v-model="selectedGroupMembers" class="w-4 h-4">
                  <span class="text-sm">{{ u.login }} <span v-if="u.status!=='active'" class="text-yellow-400 text-xs">({{u.status}})</span></span>
                </div>
              </div>
              <p class="text-xs text-slate-400 mb-4">Admin será adicionado automaticamente.</p>
              <div class="flex gap-2">
                <button @click="createGroup" class="flex-1 bg-blue-600 py-2 rounded-lg font-medium">Criar</button>
                <button @click="showNewGroupModal = false" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      `
    });

    app.mount('#app');
  </script>
</body>
</html>
