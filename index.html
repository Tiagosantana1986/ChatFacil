<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat Fechado · Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0f172a; font-family: system-ui, -apple-system, sans-serif; }
    .msg-propria { background: #2563eb; margin-left: auto; }
    .msg-outro { background: #334155; }
    .scroll-suave { scroll-behavior: smooth; }
    .badge-unread {
      background-color: #ef4444;
      color: white;
      border-radius: 9999px;
      padding: 0.125rem 0.5rem;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 0.5rem;
    }
    .avatar-placeholder {
      width: 32px; height: 32px; border-radius: 50%; background: #4b5563;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; text-transform: uppercase;
    }
    .status-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      margin-right: 4px;
    }
    .file-attachment {
      background: #1e293b;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .image-preview {
      max-width: 200px;
      max-height: 200px;
      border-radius: 8px;
      margin-top: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body class="text-gray-100">
  <div id="app" class="h-screen flex flex-col"></div>

  <script>
    const { createApp, ref, reactive, computed, watch, nextTick, onMounted } = Vue;

    const STORAGE_KEY = 'chat_fechado_db';
    const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2MB

    const defaultDB = {
      users: [
        { 
          id: 'admin1', login: 'admin', password: 'admin123', role: 'admin', 
          status: 'active', hidden: false, createdBy: null, approvedBy: null, 
          createdAt: Date.now(), passwordChanged: true,
          presence: 'online', avatar: null
        }
      ],
      conversations: [],
      groups: [],
      groupMembers: [],
      messages: [],
      lastRead: {}
    };

    function loadDB() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultDB));
        return JSON.parse(JSON.stringify(defaultDB));
      }
      try {
        const db = JSON.parse(stored);
        if (!db.lastRead) db.lastRead = {};
        db.users.forEach(u => { 
          if (u.passwordChanged === undefined) u.passwordChanged = (u.role === 'admin');
          if (!u.presence) u.presence = 'online';
          if (!u.avatar) u.avatar = null;
        });
        return db;
      } catch (e) {
        return JSON.parse(JSON.stringify(defaultDB));
      }
    }

    function saveDB(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function genId() {
      return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    const app = createApp({
      setup() {
        const db = reactive(loadDB());
        
        watch(db, (newVal) => {
          saveDB(newVal);
        }, { deep: true });

        const currentUser = ref(null);
        const loginInput = ref('');
        const senhaInput = ref('');
        const erroLogin = ref('');

        const forcePasswordChange = ref(false);
        const newPassword1 = ref('');
        const newPassword2 = ref('');
        const erroSenha = ref('');

        const activeTab = ref('chat');
        const showAdminPanel = ref(false);
        const showNewGroupModal = ref(false);
        const showNewUserModal = ref(false);
        const showProfileModal = ref(false);

        const newUserName = ref('');
        const newUserPass = ref('');
        const newUserAutoApprove = ref(true);
        const newGroupName = ref('');
        const selectedGroupMembers = ref([]);

        const activeChat = reactive({ type: null, id: null, name: '' });
        const newMessage = ref('');
        const messagesContainer = ref(null);
        const fileInput = ref(null);

        // Perfil
        const editingPresence = ref('online');
        const avatarInput = ref(null);

        // ========== COMPUTED ==========
        const visibleUsers = computed(() => {
          if (!currentUser.value) return [];
          return db.users.filter(u => 
            u.id !== currentUser.value.id &&
            u.status === 'active' &&
            !u.hidden
          );
        });

        const myPrivateChats = computed(() => {
          if (!currentUser.value) return [];
          const convs = db.conversations.filter(c => 
            c.user1 === currentUser.value.id || c.user2 === currentUser.value.id
          );
          return convs.map(c => {
            const otherId = c.user1 === currentUser.value.id ? c.user2 : c.user1;
            const other = db.users.find(u => u.id === otherId);
            return { ...c, other };
          }).filter(c => c.other);
        });

        const myGroups = computed(() => {
          if (!currentUser.value) return [];
          const memberOf = db.groupMembers.filter(m => m.userId === currentUser.value.id).map(m => m.groupId);
          return db.groups.filter(g => memberOf.includes(g.id));
        });

        const activeMessages = computed(() => {
          if (!activeChat.id) return [];
          if (activeChat.type === 'private') {
            return db.messages.filter(m => m.conversationId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          } else if (activeChat.type === 'group') {
            return db.messages.filter(m => m.groupId === activeChat.id).sort((a,b) => a.createdAt - b.createdAt);
          }
          return [];
        });

        const adminUserList = computed(() => {
          return db.users.filter(u => u.role !== 'admin');
        });

        // ========== PRESENÇA E AVATAR ==========
        function getPresenceClass(presence) {
          const map = { 'online': 'text-green-400', 'busy': 'text-yellow-400', 'away': 'text-orange-400', 'offline': 'text-gray-400' };
          return map[presence] || 'text-gray-400';
        }

        function getPresenceDot(presence) {
          const map = { 'online': '🟢', 'busy': '🟡', 'away': '🟠', 'offline': '🔴' };
          return map[presence] || '⚪';
        }

        function getUserAvatar(user) {
          if (user.avatar) return user.avatar;
          return null;
        }

        function getInitials(login) {
          return login.substring(0,2).toUpperCase();
        }

        function openProfile() {
          editingPresence.value = currentUser.value.presence || 'online';
          showProfileModal.value = true;
        }

        function saveProfile() {
          const userInDb = db.users.find(u => u.id === currentUser.value.id);
          if (userInDb) {
            userInDb.presence = editingPresence.value;
            currentUser.value.presence = editingPresence.value;
          }
          showProfileModal.value = false;
        }

        function handleAvatarUpload(event) {
          const file = event.target.files[0];
          if (!file) return;
          if (file.size > 500 * 1024) {
            alert('Imagem muito grande. Máximo 500KB.');
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            const base64 = e.target.result;
            const userInDb = db.users.find(u => u.id === currentUser.value.id);
            if (userInDb) {
              userInDb.avatar = base64;
              currentUser.value.avatar = base64;
            }
          };
          reader.readAsDataURL(file);
        }

        // ========== CONTROLE DE LEITURA ==========
        function getLastReadTimestamp(chatType, chatId) {
          if (!currentUser.value) return 0;
          const userId = currentUser.value.id;
          if (!db.lastRead[userId]) db.lastRead[userId] = { private: {}, group: {} };
          const category = chatType === 'private' ? 'private' : 'group';
          return db.lastRead[userId][category][chatId] || 0;
        }

        function setLastReadNow(chatType, chatId) {
          if (!currentUser.value) return;
          const userId = currentUser.value.id;
          if (!db.lastRead[userId]) db.lastRead[userId] = { private: {}, group: {} };
          const category = chatType === 'private' ? 'private' : 'group';
          db.lastRead[userId][category][chatId] = Date.now();
        }

        function unreadCount(chatType, chatId) {
          if (!currentUser.value) return 0;
          const lastRead = getLastReadTimestamp(chatType, chatId);
          let messages = [];
          if (chatType === 'private') {
            messages = db.messages.filter(m => m.conversationId === chatId && m.senderId !== currentUser.value.id);
          } else {
            messages = db.messages.filter(m => m.groupId === chatId && m.senderId !== currentUser.value.id);
          }
          return messages.filter(m => m.createdAt > lastRead).length;
        }

        function markAsRead(chatType, chatId) {
          setLastReadNow(chatType, chatId);
        }

        // ========== TROCA DE SENHA ==========
        function changePassword() {
          erroSenha.value = '';
          if (!newPassword1.value || newPassword1.value.length < 4) {
            erroSenha.value = 'A senha deve ter pelo menos 4 caracteres.';
            return;
          }
          if (newPassword1.value !== newPassword2.value) {
            erroSenha.value = 'As senhas não coincidem.';
            return;
          }
          if (currentUser.value && newPassword1.value === currentUser.value.password) {
            erroSenha.value = 'A nova senha deve ser diferente da senha temporária.';
            return;
          }

          const userInDb = db.users.find(u => u.id === currentUser.value.id);
          if (userInDb) {
            userInDb.password = newPassword1.value;
            userInDb.passwordChanged = true;
          }
          currentUser.value.password = newPassword1.value;
          currentUser.value.passwordChanged = true;
          
          forcePasswordChange.value = false;
          newPassword1.value = '';
          newPassword2.value = '';
        }

        // ========== AUTENTICAÇÃO ==========
        function login() {
          erroLogin.value = '';
          const user = db.users.find(u => u.login === loginInput.value && u.password === senhaInput.value);
          if (!user) {
            erroLogin.value = 'Credenciais inválidas.';
            return;
          }
          if (user.status !== 'active') {
            erroLogin.value = 'Usuário não aprovado. Aguarde o administrador.';
            return;
          }
          
          currentUser.value = { ...user };
          loginInput.value = '';
          senhaInput.value = '';
          
          if (!user.passwordChanged) {
            forcePasswordChange.value = true;
          } else {
            forcePasswordChange.value = false;
            activeTab.value = 'chat';
            if (user.role === 'admin') showAdminPanel.value = false;
          }
          
          if (!db.lastRead[user.id]) {
            db.lastRead[user.id] = { private: {}, group: {} };
          }
        }

        function logout() {
          currentUser.value = null;
          activeChat.id = null;
          activeChat.type = null;
          activeChat.name = '';
          showAdminPanel.value = false;
          forcePasswordChange.value = false;
        }

        // ========== ADMIN ==========
        function generateCredentials() {
          const adj = ['azul', 'feliz', 'rapido', 'sabio', 'forte', 'leve'];
          const sub = ['gato', 'tigre', 'lobo', 'panda', 'raposa', 'coruja'];
          newUserName.value = `${adj[Math.floor(Math.random()*6)]}.${sub[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
          newUserPass.value = `${adj[Math.floor(Math.random()*6)]}${Math.floor(Math.random()*100)}`;
        }

        function createUser() {
          if (!newUserName.value || !newUserPass.value) return;
          if (db.users.find(u => u.login === newUserName.value)) {
            alert('Login já existe.');
            return;
          }
          const newUser = {
            id: genId(),
            login: newUserName.value,
            password: newUserPass.value,
            role: 'user',
            status: newUserAutoApprove.value ? 'active' : 'pending',
            hidden: false,
            createdBy: currentUser.value.id,
            approvedBy: newUserAutoApprove.value ? currentUser.value.id : null,
            createdAt: Date.now(),
            passwordChanged: false,
            presence: 'online',
            avatar: null
          };
          db.users.push(newUser);
          newUserName.value = '';
          newUserPass.value = '';
          showNewUserModal.value = false;
        }

        function approveUser(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user) {
            user.status = 'active';
            user.approvedBy = currentUser.value.id;
          }
        }

        function toggleHidden(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user && user.role !== 'admin') {
            user.hidden = !user.hidden;
          }
        }

        function toggleBlock(userId) {
          const user = db.users.find(u => u.id === userId);
          if (user && user.role !== 'admin') {
            user.status = user.status === 'blocked' ? 'pending' : 'blocked';
          }
        }

        function deleteUser(userId) {
          const user = db.users.find(u => u.id === userId);
          if (!user || user.role === 'admin') {
            alert('Não é possível excluir um administrador.');
            return;
          }
          if (!confirm(`Tem certeza que deseja excluir o usuário "${user.login}"?`)) return;

          db.users = db.users.filter(u => u.id !== userId);
          db.conversations = db.conversations.filter(c => c.user1 !== userId && c.user2 !== userId);
          db.groupMembers = db.groupMembers.filter(m => m.userId !== userId);
          db.messages = db.messages.filter(m => m.senderId !== userId);

          if (activeChat.type === 'private') {
            const conv = db.conversations.find(c => c.id === activeChat.id);
            if (conv) {
              const otherId = conv.user1 === currentUser.value.id ? conv.user2 : conv.user1;
              if (otherId === userId) {
                activeChat.id = null; activeChat.type = null; activeChat.name = '';
              }
            }
          }
          delete db.lastRead[userId];
        }

        function deleteConversation(convId) {
          if (!confirm('Apagar esta conversa e todas as mensagens?')) return;
          db.conversations = db.conversations.filter(c => c.id !== convId);
          db.messages = db.messages.filter(m => m.conversationId !== convId);
          Object.keys(db.lastRead).forEach(uid => {
            if (db.lastRead[uid].private[convId]) delete db.lastRead[uid].private[convId];
          });
          if (activeChat.type === 'private' && activeChat.id === convId) {
            activeChat.id = null; activeChat.type = null; activeChat.name = '';
          }
        }

        function deleteGroup(groupId) {
          if (!confirm('Excluir este grupo e todas as mensagens?')) return;
          db.groups = db.groups.filter(g => g.id !== groupId);
          db.groupMembers = db.groupMembers.filter(m => m.groupId !== groupId);
          db.messages = db.messages.filter(m => m.groupId !== groupId);
          Object.keys(db.lastRead).forEach(uid => {
            if (db.lastRead[uid].group[groupId]) delete db.lastRead[uid].group[groupId];
          });
          if (activeChat.type === 'group' && activeChat.id === groupId) {
            activeChat.id = null; activeChat.type = null; activeChat.name = '';
          }
        }

        function createGroup() {
          if (!newGroupName.value || selectedGroupMembers.value.length === 0) return;
          const groupId = genId();
          db.groups.push({
            id: groupId, name: newGroupName.value,
            createdBy: currentUser.value.id, createdAt: Date.now()
          });
          [...selectedGroupMembers.value, currentUser.value.id].forEach(userId => {
            db.groupMembers.push({ groupId, userId });
          });
          newGroupName.value = '';
          selectedGroupMembers.value = [];
          showNewGroupModal.value = false;
        }

        // ========== ENVIO DE ARQUIVOS ==========
        function triggerFileUpload() {
          fileInput.value.click();
        }

        function handleFileUpload(event) {
          const file = event.target.files[0];
          if (!file) return;
          if (file.size > MAX_FILE_SIZE) {
            alert('Arquivo muito grande. Máximo de 2MB.');
            return;
          }

          const reader = new FileReader();
          reader.onload = (e) => {
            const base64 = e.target.result;
            sendFileMessage(base64, file.name, file.type);
          };
          reader.readAsDataURL(file);
          
          // Limpa input para permitir reenvio do mesmo arquivo
          event.target.value = '';
        }

        function sendFileMessage(dataUrl, fileName, fileType) {
          if (!activeChat.id) return;

          const msg = {
            id: genId(),
            senderId: currentUser.value.id,
            text: '',
            file: {
              name: fileName,
              type: fileType,
              data: dataUrl
            },
            createdAt: Date.now()
          };

          if (activeChat.type === 'private') {
            msg.conversationId = activeChat.id;
          } else {
            msg.groupId = activeChat.id;
          }

          db.messages.push(msg);
          markAsRead(activeChat.type, activeChat.id);
          scrollToBottom();
        }

        // ========== CHAT ==========
        function selectPrivateChat(userId) {
          let conv = db.conversations.find(c => 
            (c.user1 === currentUser.value.id && c.user2 === userId) ||
            (c.user1 === userId && c.user2 === currentUser.value.id)
          );
          if (!conv) {
            conv = { id: genId(), user1: currentUser.value.id, user2: userId };
            db.conversations.push(conv);
          }
          const other = db.users.find(u => u.id === userId);
          activeChat.type = 'private';
          activeChat.id = conv.id;
          activeChat.name = other.login;
          markAsRead('private', conv.id);
          scrollToBottom();
        }

        function selectGroupChat(groupId) {
          const group = db.groups.find(g => g.id === groupId);
          if (!group) return;
          activeChat.type = 'group';
          activeChat.id = groupId;
          activeChat.name = group.name;
          markAsRead('group', groupId);
          scrollToBottom();
        }

        function sendMessage() {
          if (!newMessage.value.trim() || !activeChat.id) return;
          const msg = {
            id: genId(),
            senderId: currentUser.value.id,
            text: newMessage.value.trim(),
            createdAt: Date.now()
          };
          if (activeChat.type === 'private') {
            msg.conversationId = activeChat.id;
          } else {
            msg.groupId = activeChat.id;
          }
          db.messages.push(msg);
          newMessage.value = '';
          markAsRead(activeChat.type, activeChat.id);
          scrollToBottom();
        }

        function scrollToBottom() {
          nextTick(() => {
            const el = document.querySelector('#messages-container');
            if (el) el.scrollTop = el.scrollHeight;
          });
        }

        function getSenderName(senderId) {
          const u = db.users.find(u => u.id === senderId);
          return u ? u.login : 'Desconhecido';
        }

        function getSender(senderId) {
          return db.users.find(u => u.id === senderId);
        }

        function isImageFile(fileType) {
          return fileType && fileType.startsWith('image/');
        }

        function downloadFile(dataUrl, fileName) {
          const link = document.createElement('a');
          link.href = dataUrl;
          link.download = fileName;
          link.click();
        }

        onMounted(() => {});

        return {
          db, currentUser, loginInput, senhaInput, erroLogin,
          forcePasswordChange, newPassword1, newPassword2, erroSenha, changePassword,
          activeTab, showAdminPanel, showNewUserModal, showNewGroupModal, showProfileModal,
          newUserName, newUserPass, newUserAutoApprove, newGroupName, selectedGroupMembers,
          activeChat, newMessage, fileInput,
          visibleUsers, myPrivateChats, myGroups, activeMessages, adminUserList,
          login, logout, generateCredentials, createUser, approveUser, toggleHidden, toggleBlock,
          deleteUser, deleteConversation, deleteGroup, createGroup,
          selectPrivateChat, selectGroupChat, sendMessage, getSenderName, scrollToBottom,
          unreadCount, markAsRead, getSender,
          editingPresence, avatarInput, openProfile, saveProfile, handleAvatarUpload,
          getPresenceClass, getPresenceDot, getUserAvatar, getInitials,
          triggerFileUpload, handleFileUpload, isImageFile, downloadFile
        };
      },

      template: `
        <div class="h-full flex flex-col">
          <!-- Tela de Login -->
          <div v-if="!currentUser" class="flex items-center justify-center h-full p-4">
            <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm shadow-xl">
              <h1 class="text-2xl font-bold mb-2 text-center">🔒 Chat Fechado</h1>
              <p class="text-sm text-slate-400 text-center mb-6">Acesso apenas para convidados</p>
              <form @submit.prevent="login">
                <input v-model="loginInput" type="text" placeholder="Login" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600" autocomplete="off">
                <input v-model="senhaInput" type="password" placeholder="Senha" class="w-full p-3 mb-4 bg-slate-700 rounded-lg border border-slate-600">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold">Entrar</button>
                <p v-if="erroLogin" class="text-red-400 text-sm mt-3 text-center">{{ erroLogin }}</p>
              </form>
              <div class="mt-4 text-xs text-slate-500 text-center">Admin: admin / admin123</div>
            </div>
          </div>

          <!-- Tela de Troca de Senha Obrigatória -->
          <div v-else-if="forcePasswordChange" class="flex items-center justify-center h-full p-4">
            <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm shadow-xl">
              <h2 class="text-xl font-bold mb-2 text-center">🔐 Alterar Senha</h2>
              <p class="text-sm text-slate-400 text-center mb-4">Primeiro acesso: defina sua senha pessoal</p>
              <form @submit.prevent="changePassword">
                <input v-model="newPassword1" type="password" placeholder="Nova senha" class="w-full p-3 mb-3 bg-slate-700 rounded-lg border border-slate-600">
                <input v-model="newPassword2" type="password" placeholder="Confirme a nova senha" class="w-full p-3 mb-4 bg-slate-700 rounded-lg border border-slate-600">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-semibold">Salvar nova senha</button>
                <p v-if="erroSenha" class="text-red-400 text-sm mt-3 text-center">{{ erroSenha }}</p>
              </form>
            </div>
          </div>

          <!-- Interface Principal -->
          <div v-else class="flex flex-col md:flex-row h-full">
            <!-- Sidebar -->
            <div class="w-full md:w-80 bg-slate-800 border-r border-slate-700 flex flex-col h-1/3 md:h-full">
              <!-- Cabeçalho do usuário -->
              <div class="p-3 border-b border-slate-700 flex justify-between items-center">
                <div class="flex items-center gap-2">
                  <div class="relative cursor-pointer" @click="openProfile">
                    <div v-if="currentUser.avatar" class="w-8 h-8 rounded-full overflow-hidden">
                      <img :src="currentUser.avatar" class="w-full h-full object-cover" />
                    </div>
                    <div v-else class="avatar-placeholder">{{ getInitials(currentUser.login) }}</div>
                    <span class="absolute -bottom-0.5 -right-0.5 text-sm">{{ getPresenceDot(currentUser.presence) }}</span>
                  </div>
                  <span class="font-medium">{{ currentUser.login }}</span>
                  <span v-if="currentUser.role === 'admin'" class="text-yellow-400 text-sm">👑</span>
                </div>
                <div class="flex gap-2">
                  <button v-if="currentUser.role === 'admin'" @click="showAdminPanel = !showAdminPanel" class="text-blue-400 text-sm px-2 py-1 hover:bg-slate-700 rounded">Admin</button>
                  <button @click="logout" class="text-red-400 text-sm px-2 py-1 hover:bg-slate-700 rounded">Sair</button>
                </div>
              </div>

              <!-- Painel Admin -->
              <div v-if="showAdminPanel && currentUser.role === 'admin'" class="p-3 border-b border-slate-700 bg-slate-750 space-y-3">
                <div class="flex justify-between items-center">
                  <h3 class="font-semibold text-sm">👥 Usuários</h3>
                  <button @click="showNewUserModal = true" class="text-xs bg-blue-600 px-2 py-1 rounded">+ Novo</button>
                </div>
                <div class="max-h-40 overflow-y-auto text-sm space-y-1">
                  <div v-for="u in db.users" :key="u.id" class="flex items-center justify-between py-1 border-b border-slate-700 last:border-0">
                    <div class="flex items-center gap-1">
                      <span :class="{'text-green-400': u.status==='active', 'text-yellow-400': u.status==='pending', 'text-red-400': u.status==='blocked'}">{{ u.login }}</span>
                      <span v-if="u.hidden" class="text-gray-500 text-xs">🔒</span>
                    </div>
                    <div class="flex items-center gap-1">
                      <span v-if="!u.passwordChanged" class="text-orange-300 text-xs mr-1" title="Senha temporária">⚠️</span>
                      <span v-else class="text-green-400 text-xs mr-1" title="Senha alterada">🔐</span>
                      <button v-if="u.status === 'pending'" @click="approveUser(u.id)" class="text-green-400 text-xs px-1">✓</button>
                      <button @click="toggleHidden(u.id)" class="text-gray-400 text-xs px-1" :title="u.hidden ? 'Tornar visível' : 'Ocultar'">{{ u.hidden ? '👁' : '👻' }}</button>
                      <button v-if="u.role !== 'admin'" @click="toggleBlock(u.id)" class="text-xs px-1" :class="u.status==='blocked' ? 'text-green-400' : 'text-red-400'">{{ u.status==='blocked' ? '🔓' : '🔒' }}</button>
                      <button v-if="u.role !== 'admin'" @click="deleteUser(u.id)" class="text-red-400 text-xs px-1" title="Excluir usuário">🗑️</button>
                    </div>
                  </div>
                </div>
                <div class="flex justify-between items-center mt-3">
                  <h3 class="font-semibold text-sm">📁 Grupos</h3>
                  <button @click="showNewGroupModal = true" class="text-xs bg-blue-600 px-2 py-1 rounded">+ Criar</button>
                </div>
              </div>

              <!-- Nova conversa -->
              <div class="p-3 border-b border-slate-700">
                <select @change="selectPrivateChat($event.target.value)" class="w-full p-2 bg-slate-700 rounded-lg border border-slate-600 text-sm">
                  <option value="">➕ Nova conversa privada...</option>
                  <option v-for="u in visibleUsers" :key="u.id" :value="u.id">{{ u.login }}</option>
                </select>
              </div>

              <!-- Listas -->
              <div class="flex-1 overflow-y-auto p-3 space-y-3">
                <div>
                  <div class="text-xs text-slate-400 mb-1 font-medium">Conversas</div>
                  <div v-for="chat in myPrivateChats" :key="chat.id" class="group flex items-center justify-between p-2 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                    <div @click="selectPrivateChat(chat.other.id)" class="flex items-center gap-2 flex-1">
                      <div class="relative">
                        <div v-if="chat.other.avatar" class="w-6 h-6 rounded-full overflow-hidden">
                          <img :src="chat.other.avatar" class="w-full h-full object-cover" />
                        </div>
                        <div v-else class="w-6 h-6 rounded-full bg-slate-600 flex items-center justify-center text-xs">{{ getInitials(chat.other.login) }}</div>
                        <span class="absolute -bottom-0.5 -right-0.5 text-xs">{{ getPresenceDot(chat.other.presence) }}</span>
                      </div>
                      <span class="truncate">{{ chat.other.login }}</span>
                      <span v-if="unreadCount('private', chat.id) > 0" class="badge-unread">{{ unreadCount('private', chat.id) }}</span>
                    </div>
                    <button @click.stop="deleteConversation(chat.id)" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 px-1" title="Excluir conversa">🗑️</button>
                  </div>
                  <div v-if="myPrivateChats.length === 0" class="text-slate-500 text-xs p-2">Nenhuma conversa</div>
                </div>
                <div class="border-t border-slate-700 pt-2">
                  <div class="text-xs text-slate-400 mb-1 font-medium">Grupos</div>
                  <div v-for="group in myGroups" :key="group.id" class="group flex items-center justify-between p-2 hover:bg-slate-700 rounded-lg cursor-pointer transition">
                    <div @click="selectGroupChat(group.id)" class="flex items-center gap-2 flex-1">
                      <span>👥</span>
                      <span class="truncate">{{ group.name }}</span>
                      <span v-if="unreadCount('group', group.id) > 0" class="badge-unread">{{ unreadCount('group', group.id) }}</span>
                    </div>
                    <button v-if="currentUser.role === 'admin'" @click.stop="deleteGroup(group.id)" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 px-1" title="Excluir grupo">🗑️</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Área do Chat -->
            <div class="flex-1 flex flex-col h-2/3 md:h-full bg-slate-900">
              <div class="p-3 border-b border-slate-700 font-semibold flex items-center gap-2">
                <span v-if="activeChat.type === 'private'">💬</span>
                <span v-else-if="activeChat.type === 'group'">👥</span>
                <span>{{ activeChat.name || 'Selecione uma conversa' }}</span>
              </div>
              <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-suave">
                <div v-for="msg in activeMessages" :key="msg.id" class="flex gap-2" :class="{'flex-row-reverse': msg.senderId === currentUser.id}">
                  <div v-if="msg.senderId !== currentUser.id" class="flex-shrink-0">
                    <div v-if="getSender(msg.senderId)?.avatar" class="w-8 h-8 rounded-full overflow-hidden">
                      <img :src="getSender(msg.senderId).avatar" class="w-full h-full object-cover" />
                    </div>
                    <div v-else class="avatar-placeholder w-8 h-8 text-xs">{{ getInitials(getSenderName(msg.senderId)) }}</div>
                  </div>
                  <div class="max-w-[70%]">
                    <div v-if="msg.senderId !== currentUser.id" class="text-xs text-blue-300 mb-1">{{ getSenderName(msg.senderId) }}</div>
                    
                    <!-- Mensagem de texto -->
                    <div v-if="msg.text" class="p-3 rounded-2xl text-sm" :class="msg.senderId === currentUser.id ? 'msg-propria' : 'msg-outro'">{{ msg.text }}</div>
                    
                    <!-- Mensagem de arquivo -->
                    <div v-if="msg.file" class="mt-1">
                      <div v-if="isImageFile(msg.file.type)" class="image-preview" @click="downloadFile(msg.file.data, msg.file.name)">
                        <img :src="msg.file.data" class="max-w-full rounded-lg" />
                      </div>
                      <div v-else class="file-attachment">
                        <span>📎</span>
                        <span class="flex-1 truncate">{{ msg.file.name }}</span>
                        <button @click="downloadFile(msg.file.data, msg.file.name)" class="text-blue-400 text-sm hover:underline">Baixar</button>
                      </div>
                    </div>

                    <span class="text-xs text-slate-500 mt-1 block">{{ new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }}</span>
                  </div>
                </div>
              </div>
              
              <!-- Barra de envio -->
              <div v-if="activeChat.id" class="p-3 border-t border-slate-700 flex items-center gap-2">
                <input v-model="newMessage" type="text" placeholder="Digite sua mensagem..." class="flex-1 p-3 bg-slate-800 rounded-full border border-slate-600" @keyup.enter="sendMessage">
                <button @click="triggerFileUpload" class="p-3 bg-slate-700 hover:bg-slate-600 rounded-full" title="Anexar arquivo">📎</button>
                <button @click="sendMessage" class="p-3 bg-blue-600 hover:bg-blue-700 rounded-full" title="Enviar">➤</button>
                <input type="file" ref="fileInput" class="hidden" @change="handleFileUpload">
              </div>
              <div v-else class="p-3 border-t border-slate-700 text-center text-slate-500">
                Selecione uma conversa para começar
              </div>
            </div>
          </div>

          <!-- Modal de Perfil (status + avatar) -->
          <div v-if="showProfileModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showProfileModal = false">
            <div class="bg-slate-800 p-5 rounded-xl w-full max-w-sm">
              <h2 class="text-lg font-bold mb-4">Meu Perfil</h2>
              <div class="flex flex-col items-center mb-4">
                <div class="relative mb-2">
                  <div v-if="currentUser.avatar" class="w-20 h-20 rounded-full overflow-hidden">
                    <img :src="currentUser.avatar" class="w-full h-full object-cover" />
                  </div>
                  <div v-else class="avatar-placeholder w-20 h-20 text-2xl">{{ getInitials(currentUser.login) }}</div>
                  <label class="absolute bottom-0 right-0 bg-slate-600 p-1 rounded-full cursor-pointer">
                    <span>📷</span>
                    <input type="file" accept="image/*" class="hidden" @change="handleAvatarUpload" ref="avatarInput">
                  </label>
                </div>
                <p class="text-sm text-slate-400">Toque na câmera para alterar a foto</p>
              </div>
              <div class="mb-4">
                <label class="block text-sm mb-1">Status</label>
                <select v-model="editingPresence" class="w-full p-2 bg-slate-700 rounded border border-slate-600">
                  <option value="online">🟢 Disponível</option>
                  <option value="busy">🟡 Ocupado</option>
                  <option value="away">🟠 Ausente</option>
                  <option value="offline">🔴 Offline</option>
                </select>
              </div>
              <div class="flex gap-2">
                <button @click="saveProfile" class="flex-1 bg-blue-600 py-2 rounded-lg">Salvar</button>
                <button @click="showProfileModal = false" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>

          <!-- Modal Criar Usuário (admin) -->
          <div v-if="showNewUserModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewUserModal = false">
            <div class="bg-slate-800 p-5 rounded-xl w-full max-w-md">
              <h2 class="text-lg font-bold mb-4">Criar novo usuário</h2>
              <div class="space-y-3">
                <input v-model="newUserName" type="text" placeholder="Login" class="w-full p-2 bg-slate-700 rounded border border-slate-600">
                <input v-model="newUserPass" type="text" placeholder="Senha temporária" class="w-full p-2 bg-slate-700 rounded border border-slate-600">
                <div class="flex items-center gap-2">
                  <input type="checkbox" v-model="newUserAutoApprove" id="autoApprove" class="w-4 h-4">
                  <label for="autoApprove" class="text-sm">Aprovar automaticamente</label>
                </div>
                <button @click="generateCredentials" class="text-sm text-blue-400">🎲 Gerar credenciais aleatórias</button>
              </div>
              <div class="flex gap-2 mt-5">
                <button @click="createUser" class="flex-1 bg-blue-600 py-2 rounded-lg">Criar</button>
                <button @click="showNewUserModal = false" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>

          <!-- Modal Criar Grupo -->
          <div v-if="showNewGroupModal" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" @click.self="showNewGroupModal = false">
            <div class="bg-slate-800 p-5 rounded-xl w-full max-w-md">
              <h2 class="text-lg font-bold mb-4">Criar novo grupo</h2>
              <input v-model="newGroupName" type="text" placeholder="Nome do grupo" class="w-full p-2 mb-3 bg-slate-700 rounded border border-slate-600">
              <div class="max-h-52 overflow-y-auto border border-slate-600 rounded p-2 mb-3">
                <div v-for="u in adminUserList" :key="u.id" class="flex items-center gap-2 py-1">
                  <input type="checkbox" :value="u.id" v-model="selectedGroupMembers" class="w-4 h-4">
                  <span class="text-sm">{{ u.login }} <span v-if="u.status!=='active'" class="text-yellow-400 text-xs">({{u.status}})</span></span>
                </div>
              </div>
              <p class="text-xs text-slate-400 mb-4">Admin será adicionado automaticamente.</p>
              <div class="flex gap-2">
                <button @click="createGroup" class="flex-1 bg-blue-600 py-2 rounded-lg">Criar</button>
                <button @click="showNewGroupModal = false" class="flex-1 bg-slate-700 py-2 rounded-lg">Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      `
    });

    app.mount('#app');
  </script>
</body>
</html>
